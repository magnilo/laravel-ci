image: docker:24

services:
  - name: docker:24-dind
    command: ["--tls=false"]

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2
  IMAGE_NAME: laravel-ci-app

stages:
  - test
  - deploy

before_script:
  - echo "Starting CI pipeline..."
  - docker info

test:
  stage: test
  tags:
    - docker
  script:
    - docker build -t $IMAGE_NAME .
    - docker run --rm $IMAGE_NAME php -v

deploy:
  stage: deploy
  tags:
    - docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Deploy stage placeholder"
    - echo "Use Envoy or rsync from here"
