image: php:8.4-cli

stages:
  - test
  - build
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - vendor/
    - node_modules/

before_script:
  - apt-get update -y
  - apt-get install -y git unzip zip curl nodejs npm openssh-client libzip-dev libpng-dev libonig-dev libxml2-dev
  - docker-php-ext-install pdo pdo_mysql mbstring zip exif pcntl bcmath
  - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

test:
  stage: test
  script:
    - composer install --no-interaction --prefer-dist --optimize-autoloader
    - npm install
    - php artisan test

build-assets:
  stage: build
  script:
    - npm install
    - npm run production
  artifacts:
    paths:
      - public/css/
      - public/js/
      - public/mix-manifest.json
    expire_in: 1 week

deploy-vps:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  script:
    - eval "$(ssh-agent -s)"
    - echo "$VPS_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 600 ~/.ssh/known_hosts
    - ssh "$VPS_SSH_USER@$VPS_SSH_HOST" "export DEPLOY_PATH='$VPS_DEPLOY_PATH' DEPLOY_REF='$CI_COMMIT_SHA'; bash -s" < scripts/deploy_vps.sh
